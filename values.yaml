replicaCount: 1

image:
  repository: openvpn/openvpn-as
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  ports:
    admin: 943
    tcp: 443
    udp: 1194

persistence:
  enabled: true
  size: 5Gi
  storageClass:
  accessMode: ReadWriteOnce

  # Optional: use existing persistent volume claim
  pvcRefName:

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 1536Mi
  # requests:
  #   cpu: 100m
  #   memory: 1024Mi

securityContext:
  # privileged is required for access TUN devices starting from Kubernetes version 1.31.3
  # please check README for more options
  privileged: false
  capabilities:
    add:
      - NET_ADMIN
      - MKNOD

postStart:
  enabled: false

  # Optional: inline override
  customScript: ""

  # Optional: use existing secret
  secretRefName: ""
